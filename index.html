<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Rawr - Categorías</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <!-- HEADER TEATRAL -->
    <div class="header-teatral">
        <h1 class="header-titulo">🎭 Trivia Universitaria 🎭</h1>
        <h2 class="header-subtitulo">✨ Escanea una categoría ✨</h2>
        <div class="separador-decorativo"></div>
    </div>

    <!-- CONTENEDOR DE CATEGORÍAS -->
    <div class="categorias">
        <div class="categoria-card">
            <h3>🌟 Fama</h3>
            <div id="qr-fama"></div>
        </div>

        <div class="categoria-card">
            <h3>🔗 Vínculos</h3>
            <div id="qr-vinculos"></div>
        </div>

        <div class="categoria-card">
            <h3>😔 Resignación</h3>
            <div id="qr-resignacion"></div>
        </div>

        <div class="categoria-card">
            <h3>😊 Felicidad</h3>
            <div id="qr-felicidad"></div>
        </div>

        <div class="categoria-card">
            <h3>☄️ Meteorito</h3>
            <div id="qr-meteorito"></div>
        </div>

        <div class="categoria-card">
            <h3>📋 Proyecto</h3>
            <div id="qr-proyecto"></div>
        </div>
    </div>

    <div class="separador-decorativo"></div>

    <!-- CARTEL DECORATIVO COMPLETO -->
    <div class="cartel-wrapper">
        <div id="pregunta-container">
            <div class="cartel-textura"></div>

            <div class="pregunta-container-ornament ornament-top-left"></div>
            <div class="pregunta-container-ornament ornament-top-right"></div>
            <div class="pregunta-container-ornament ornament-bottom-left"></div>
            <div class="pregunta-container-ornament ornament-bottom-right"></div>

            <div class="cartel-line-top"></div>
            <div class="cartel-line-bottom"></div>

            <div class="lazo-decorativo lazo-izquierda">🎀</div>
            <div class="lazo-decorativo lazo-derecha">🎀</div>

            <!-- Aquí iría el contenido dinámico de la pregunta -->
        </div>
    </div>

    <!-- SCRIPT QR -->
    <script>
        const baseURL = "https://azkeele.github.io/trivia-rawr/categoria.html?cat=";
        const categorias = ["fama","vinculos","resignacion","felicidad","meteorito","proyecto"];
        const qrSize = window.innerWidth < 768 ? 110 : 150;

        categorias.forEach(cat => {
            new QRCode(document.getElementById("qr-" + cat), {
                text: baseURL + cat,
                width: qrSize,
                height: qrSize,
                colorDark: "#3a2616",
                colorLight: "#f5deb3"
            });
        });
    </script>
</body>
</html>
